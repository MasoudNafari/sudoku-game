name: Download Model from Hugging Face

on:
  workflow_dispatch:  # Allows you to run the workflow manually from the GitHub Actions tab

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs
          git lfs install

      - name: Clone model from Hugging Face
        run: |
          # این دستور، مدل را در پوشه 'my_downloaded_model' دانلود می‌کند
          git lfs clone https://huggingface.co/roshan-research/hazm-postagger my_downloaded_model

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my_downloaded_model
          git commit -m "Add downloaded model from Hugging Face" || echo "No changes to commit"
          git push
